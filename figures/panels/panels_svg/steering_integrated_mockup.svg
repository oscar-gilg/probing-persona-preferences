<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&amp;display=swap');
    text { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', 'SF Mono', 'Menlo', monospace; }
  </style>
  <defs>
    <marker id="chevron" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <symbol id="probe-green" viewBox="-12 -12 24 24" overflow="visible">
      <rect x="-10" y="-10" width="20" height="20" rx="2.5" ry="2.5" fill="none" stroke="#166534" stroke-width="1.6"/>
      <line x1="-5" y1="5" x2="5" y2="5" stroke="#86EFAC" stroke-width="1.2"/>
      <line x1="-5" y1="5" x2="-5" y2="-5" stroke="#86EFAC" stroke-width="1.2"/>
      <circle cx="-5" cy="5" r="1.5" fill="#166534"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#166534" stroke-width="1.9"/>
      <line x1="5" y1="-5" x2="2.5" y2="-5" stroke="#166534" stroke-width="1.9" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="5" y2="-2.5" stroke="#166534" stroke-width="1.9" stroke-linecap="round"/>
    </symbol>

    <symbol id="probe-red" viewBox="-12 -12 24 24" overflow="visible">
      <rect x="-10" y="-10" width="20" height="20" rx="2.5" ry="2.5" fill="none" stroke="#991B1B" stroke-width="1.6"/>
      <line x1="-5" y1="5" x2="5" y2="5" stroke="#FCA5A5" stroke-width="1.2"/>
      <line x1="-5" y1="5" x2="-5" y2="-5" stroke="#FCA5A5" stroke-width="1.2"/>
      <circle cx="-5" cy="5" r="1.5" fill="#991B1B"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#991B1B" stroke-width="1.9"/>
      <line x1="5" y1="-5" x2="2.5" y2="-5" stroke="#991B1B" stroke-width="1.9" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="5" y2="-2.5" stroke="#991B1B" stroke-width="1.9" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1280" height="480" fill="#FAF9F6"/>

  <!-- =========================================================== -->
  <!-- LEFT: SCHEMATIC                                              -->
  <!-- =========================================================== -->

  <rect x="30" y="120" width="290" height="240" rx="14" ry="14" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="50" y="144" font-size="13" fill="#9CA3AF" font-style="italic">user</text>
  <text x="50" y="170" font-size="15" fill="#374151">Choose a task and complete it.</text>

  <!-- Task A: label and +c on same line -->
  <text x="50" y="210" font-size="13" fill="#6B7280" font-weight="600">Task A:</text>
  <!-- Green span: x=50..313 (width 263), center x = 181 -->
  <g transform="translate(150, 204)">
    <text x="0" y="6" font-size="17" fill="#166534" font-weight="700" class="mono">+ c</text>
    <use href="#probe-green" x="36" y="-13" width="26" height="26"/>
  </g>

  <rect x="50" y="222" width="263" height="22" rx="3" ry="3" fill="#D1FAE5" stroke="none"/>
  <text x="56" y="238" font-size="15" fill="#065F46">Write a short poem about the seasons.</text>

  <!-- Task B: label and -c on same line -->
  <text x="50" y="294" font-size="13" fill="#6B7280" font-weight="600">Task B:</text>
  <g transform="translate(150, 288)">
    <text x="0" y="6" font-size="17" fill="#991B1B" font-weight="700" class="mono">− c</text>
    <use href="#probe-red" x="36" y="-13" width="26" height="26"/>
  </g>

  <rect x="50" y="306" width="190" height="22" rx="3" ry="3" fill="#FEE2E2" stroke="none"/>
  <text x="56" y="322" font-size="15" fill="#991B1B">Solve a quadratic equation.</text>

  <!-- short arrow -->
  <line x1="328" y1="240" x2="356" y2="240" stroke="#374151" stroke-width="2.2" marker-end="url(#chevron)"/>

  <!-- =========================================================== -->
  <!-- PANEL (a): CONTRASTIVE                                       -->
  <!-- panel x: 365..810 ; plot area: 425..800 (375 × 320)          -->
  <!-- =========================================================== -->

  <rect x="365" y="30" width="445" height="420" rx="10" ry="10" fill="white" stroke="#D1D5DB" stroke-width="1.2"/>

  <text x="587" y="60" text-anchor="middle" font-size="15" fill="#374151" font-weight="700">(a) Contrastive steering</text>

  <text x="393" y="250" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90 393 250)">P(chose steered task | responded)</text>

  <line x1="425" y1="410" x2="800" y2="410" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="425" y1="90" x2="425" y2="410" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="425" y1="250" x2="800" y2="250" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="612" y1="90" x2="612" y2="410" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>

  <text x="419" y="94" text-anchor="end" font-size="11" fill="#6B7280">1.0</text>
  <text x="419" y="254" text-anchor="end" font-size="11" fill="#6B7280">0.5</text>
  <text x="419" y="414" text-anchor="end" font-size="11" fill="#6B7280">0.0</text>

  <!-- xticks: -0.05→425, -0.03→500, 0→612, +0.03→725, +0.05→800 -->
  <text x="425" y="426" text-anchor="middle" font-size="11" fill="#6B7280">−0.05</text>
  <text x="500" y="426" text-anchor="middle" font-size="11" fill="#6B7280">−0.03</text>
  <text x="612" y="426" text-anchor="middle" font-size="11" fill="#6B7280">0</text>
  <text x="725" y="426" text-anchor="middle" font-size="11" fill="#6B7280">+0.03</text>
  <text x="792" y="426" text-anchor="middle" font-size="11" fill="#6B7280">+0.05</text>
  <text x="612" y="448" text-anchor="middle" font-size="14" fill="#374151" font-style="italic" class="mono">c</text>

  <path d="M 425 406 L 612 407 L 800 407 L 800 410 L 425 410 Z" fill="#FECACA" opacity="0.55"/>

  <!-- mapping (a): y = 410 - P*320 -->
  <!-- bb: 0.01, 0.02, 0.50, 0.97, 0.99 -->
  <polyline points="425,406.8 500,403.6 612,250 725,99.6 800,93.2"
            fill="none" stroke="#1f77b4" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#1f77b4">
    <circle cx="425" cy="406.8" r="3.6"/>
    <circle cx="500" cy="403.6" r="3.6"/>
    <circle cx="612" cy="250" r="3.6"/>
    <circle cx="725" cy="99.6" r="3.6"/>
    <circle cx="800" cy="93.2" r="3.6"/>
  </g>

  <!-- hb: 0.05, 0.18, 0.50, 0.83, 0.96 -->
  <polyline points="425,394 500,352.4 612,250 725,144.4 800,102.8"
            fill="none" stroke="#ff7f0e" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#ff7f0e">
    <circle cx="425" cy="394" r="3.6"/>
    <circle cx="500" cy="352.4" r="3.6"/>
    <circle cx="612" cy="250" r="3.6"/>
    <circle cx="725" cy="144.4" r="3.6"/>
    <circle cx="800" cy="102.8" r="3.6"/>
  </g>

  <!-- hh: 0.04, 0.10, 0.50, 0.89, 0.97 -->
  <polyline points="425,397.2 500,378 612,250 725,125.2 800,99.6"
            fill="none" stroke="#d62728" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#d62728">
    <circle cx="425" cy="397.2" r="3.6"/>
    <circle cx="500" cy="378" r="3.6"/>
    <circle cx="612" cy="250" r="3.6"/>
    <circle cx="725" cy="125.2" r="3.6"/>
    <circle cx="800" cy="99.6" r="3.6"/>
  </g>

  <g transform="translate(445, 100)">
    <rect x="-4" y="-8" width="124" height="62" rx="4" ry="4" fill="white" opacity="0.92"/>
    <line x1="0" y1="0" x2="14" y2="0" stroke="#1f77b4" stroke-width="2.8"/>
    <text x="20" y="4" font-size="11" fill="#374151">benign–benign</text>
    <line x1="0" y1="16" x2="14" y2="16" stroke="#ff7f0e" stroke-width="2.8"/>
    <text x="20" y="20" font-size="11" fill="#374151">harm–benign</text>
    <line x1="0" y1="32" x2="14" y2="32" stroke="#d62728" stroke-width="2.8"/>
    <text x="20" y="36" font-size="11" fill="#374151">harm–harm</text>
    <rect x="0" y="44" width="14" height="6" fill="#FECACA" opacity="0.6"/>
    <text x="20" y="50" font-size="11" fill="#374151">refusal rate</text>
  </g>

  <!-- =========================================================== -->
  <!-- PANEL (b): SINGLE-TASK                                       -->
  <!-- panel x: 825..1270 ; plot area: 885..1260                    -->
  <!-- =========================================================== -->

  <rect x="825" y="30" width="445" height="420" rx="10" ry="10" fill="white" stroke="#D1D5DB" stroke-width="1.2"/>

  <text x="1047" y="60" text-anchor="middle" font-size="15" fill="#374151" font-weight="700">(b) Single-task steering</text>

  <text x="853" y="250" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90 853 250)">P(chose steered task | responded)</text>

  <line x1="885" y1="410" x2="1260" y2="410" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="885" y1="90" x2="885" y2="410" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="885" y1="250" x2="1260" y2="250" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="1072" y1="90" x2="1072" y2="410" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>

  <text x="879" y="94" text-anchor="end" font-size="11" fill="#6B7280">1.0</text>
  <text x="879" y="254" text-anchor="end" font-size="11" fill="#6B7280">0.5</text>
  <text x="879" y="414" text-anchor="end" font-size="11" fill="#6B7280">0.0</text>

  <!-- xticks: -0.05→885, -0.03→960, 0→1072, +0.03→1185, +0.05→1260 -->
  <text x="885" y="426" text-anchor="middle" font-size="11" fill="#6B7280">−0.05</text>
  <text x="960" y="426" text-anchor="middle" font-size="11" fill="#6B7280">−0.03</text>
  <text x="1072" y="426" text-anchor="middle" font-size="11" fill="#6B7280">0</text>
  <text x="1185" y="426" text-anchor="middle" font-size="11" fill="#6B7280">+0.03</text>
  <text x="1252" y="426" text-anchor="middle" font-size="11" fill="#6B7280">+0.05</text>
  <text x="1072" y="448" text-anchor="middle" font-size="14" fill="#374151" font-style="italic" class="mono">c</text>

  <path d="M 885 406 L 1072 407 L 1260 407 L 1260 410 L 885 410 Z" fill="#FECACA" opacity="0.55"/>

  <!-- bb: 0.0, 0.04, 0.5, 0.59, 0.49 -->
  <polyline points="885,410 960,397.2 1072,250 1185,221.2 1260,253.2"
            fill="none" stroke="#1f77b4" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#1f77b4">
    <circle cx="885" cy="410" r="3.6"/>
    <circle cx="960" cy="397.2" r="3.6"/>
    <circle cx="1072" cy="250" r="3.6"/>
    <circle cx="1185" cy="221.2" r="3.6"/>
    <circle cx="1260" cy="253.2" r="3.6"/>
  </g>

  <!-- hb: 0.23, 0.33, 0.5, 0.66, 0.72 -->
  <polyline points="885,336.4 960,304.4 1072,250 1185,198.8 1260,179.6"
            fill="none" stroke="#ff7f0e" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#ff7f0e">
    <circle cx="885" cy="336.4" r="3.6"/>
    <circle cx="960" cy="304.4" r="3.6"/>
    <circle cx="1072" cy="250" r="3.6"/>
    <circle cx="1185" cy="198.8" r="3.6"/>
    <circle cx="1260" cy="179.6" r="3.6"/>
  </g>

  <!-- hh: 0.24, 0.30, 0.5, 0.65, 0.76 -->
  <polyline points="885,333.2 960,314 1072,250 1185,202 1260,166.8"
            fill="none" stroke="#d62728" stroke-width="2.8" stroke-linecap="round"/>
  <g fill="#d62728">
    <circle cx="885" cy="333.2" r="3.6"/>
    <circle cx="960" cy="314" r="3.6"/>
    <circle cx="1072" cy="250" r="3.6"/>
    <circle cx="1185" cy="202" r="3.6"/>
    <circle cx="1260" cy="166.8" r="3.6"/>
  </g>

</svg>
