<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="2100" height="1200">
  <style>
    text { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
  </style>
  <defs>
    <marker id="chev" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#6B7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chev-light" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Robots (free-floating; no surrounding box) -->
    <g id="robot-default">
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#D1FAE5" stroke="#166534" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="5" fill="#166534"/>
      <circle cx="22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="5" fill="#166534"/>
      <path d="M -25 15 Q 0 30 25 15" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    </g>
    <g id="robot-aura">
      <circle cx="0" cy="-6" r="78" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.6"/>
      <circle cx="0" cy="-6" r="68" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.4"/>
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#E0E7FF" stroke="#4F46E5" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="3" fill="#4F46E5"/>
      <circle cx="22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="3" fill="#4F46E5"/>
      <path d="M -18 18 Q 0 22 18 18" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
    </g>
    <g id="robot-evil">
      <polygon points="-32,-52 -22,-34 -42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <polygon points="32,-52 22,-34 42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#FEE2E2" stroke="#991B1B" stroke-width="3"/>
      <g transform="translate(-22, -18) rotate(25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <g transform="translate(22, -18) rotate(-25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <circle cx="-22" cy="-14" r="3" fill="#991B1B"/>
      <circle cx="22" cy="-14" r="3" fill="#991B1B"/>
      <path d="M -18 22 Q 0 14 18 22" fill="none" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
    </g>

    <!-- Probe glyph: faint cross axes through origin + dark v̂ direction line, arrow at +end -->
    <g id="probe-base">
      <rect x="-52" y="-44" width="104" height="88" rx="6" ry="6" fill="white" stroke="#9CA3AF" stroke-width="1.4"/>
      <!-- faint reference cross -->
      <line x1="-42" y1="0" x2="42" y2="0" stroke="#E5E7EB" stroke-width="1"/>
      <line x1="0" y1="-34" x2="0" y2="34" stroke="#E5E7EB" stroke-width="1"/>
      <!-- v̂ line through origin (extends in both directions to show ± readings) -->
      <line x1="-34" y1="34" x2="34" y2="-34" stroke="#374151" stroke-width="1.8"/>
      <!-- arrowhead at + end -->
      <polyline points="28,-26 34,-34 26,-28" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- origin -->
      <circle cx="0" cy="0" r="1.8" fill="#374151"/>
      <!-- v̂ symbol -->
      <text x="38" y="-26" font-size="14" fill="#374151" font-weight="700" font-style="italic">v̂</text>
    </g>
  </defs>

  <rect x="0" y="0" width="1050" height="600" rx="16" ry="16" fill="#F5F3EF"/>

  <!-- HEADLINE -->
  <text x="525" y="35" text-anchor="middle" font-size="18" fill="#1F2937" font-weight="700">A single direction tracks preferences across different personas.</text>

  <!-- TASK arrows into each robot -->
  <text x="200" y="80" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600" font-style="italic">task</text>
  <line x1="200" y1="88" x2="200" y2="118" stroke="#6B7280" stroke-width="1.8" marker-end="url(#chev)"/>

  <text x="525" y="80" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600" font-style="italic">task</text>
  <line x1="525" y1="88" x2="525" y2="118" stroke="#6B7280" stroke-width="1.8" marker-end="url(#chev)"/>

  <text x="850" y="80" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600" font-style="italic">task</text>
  <line x1="850" y1="88" x2="850" y2="118" stroke="#6B7280" stroke-width="1.8" marker-end="url(#chev)"/>

  <!-- ROBOTS (free-floating) -->
  <g transform="translate(200, 175) scale(0.55)"><use href="#robot-default"/></g>
  <text x="200" y="240" text-anchor="middle" font-size="14" fill="#166534" font-weight="700">default</text>

  <g transform="translate(525, 175) scale(0.55)"><use href="#robot-aura"/></g>
  <text x="525" y="240" text-anchor="middle" font-size="14" fill="#4F46E5" font-weight="700">aura</text>

  <g transform="translate(850, 175) scale(0.55)"><use href="#robot-evil"/></g>
  <text x="850" y="240" text-anchor="middle" font-size="14" fill="#991B1B" font-weight="700">evil</text>

  <!-- "activations" arrows from robot to probe -->
  <text x="100" y="265" font-size="11" fill="#9CA3AF" font-weight="600" font-style="italic">activations</text>
  <line x1="200" y1="250" x2="200" y2="278" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>
  <line x1="525" y1="250" x2="525" y2="278" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>
  <line x1="850" y1="250" x2="850" y2="278" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>

  <!-- PROBE GLYPHS centered at y=325 (box 104x88, edges y=281..369) -->
  <!-- Score s ∈ [-1,+1] mapped to (34s, -34s) along v̂ -->

  <!-- DEFAULT: comfort=+0.72, solve=+0.42, mock=-0.55 -->
  <g transform="translate(200, 325)">
    <use href="#probe-base"/>
    <circle cx="24.5" cy="-24.5" r="4" fill="#D97706" stroke="white" stroke-width="0.9"/>
    <circle cx="14.3" cy="-14.3" r="4" fill="#7C3AED" stroke="white" stroke-width="0.9"/>
    <circle cx="-18.7" cy="18.7" r="4" fill="#DB2777" stroke="white" stroke-width="0.9"/>
  </g>

  <!-- AURA: comfort=+0.85, solve=+0.30, mock=-0.45 -->
  <g transform="translate(525, 325)">
    <use href="#probe-base"/>
    <circle cx="28.9" cy="-28.9" r="4" fill="#D97706" stroke="white" stroke-width="0.9"/>
    <circle cx="10.2" cy="-10.2" r="4" fill="#7C3AED" stroke="white" stroke-width="0.9"/>
    <circle cx="-15.3" cy="15.3" r="4" fill="#DB2777" stroke="white" stroke-width="0.9"/>
  </g>

  <!-- EVIL: comfort=-0.65, solve=+0.10, mock=+0.66 -->
  <g transform="translate(850, 325)">
    <use href="#probe-base"/>
    <circle cx="-22.1" cy="22.1" r="4" fill="#D97706" stroke="white" stroke-width="0.9"/>
    <circle cx="3.4" cy="-3.4" r="4" fill="#7C3AED" stroke="white" stroke-width="0.9"/>
    <circle cx="22.4" cy="-22.4" r="4" fill="#DB2777" stroke="white" stroke-width="0.9"/>
  </g>

  <!-- "scores" arrows probe → bar chart -->
  <text x="100" y="388" font-size="11" fill="#9CA3AF" font-weight="600" font-style="italic">scores</text>
  <line x1="200" y1="372" x2="200" y2="398" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>
  <line x1="525" y1="372" x2="525" y2="398" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>
  <line x1="850" y1="372" x2="850" y2="398" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#chev-light)"/>

  <!-- ═══ BAR CHART BOXES (one per persona) ═══ -->
  <!-- Box: w=290, h=140, top y=405. Center vert dashed line at column-x. Bar scaling: 80px per unit. -->

  <!-- ── DEFAULT BOX -->
  <g id="box-default">
    <rect x="55" y="405" width="290" height="140" rx="10" ry="10" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="200" y1="430" x2="200" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="118" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">−</text>
    <text x="282" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">+</text>

    <text x="65" y="455" font-size="10.5" fill="#D97706" font-weight="600">comfort a colleague</text>
    <rect x="200" y="460" width="58" height="14" rx="2.5" ry="2.5" fill="#D97706" opacity="0.9"/>
    <text x="263" y="471" font-size="10" fill="#D97706" font-weight="700">+0.72</text>

    <text x="65" y="490" font-size="10.5" fill="#7C3AED" font-weight="600">solve a hard puzzle</text>
    <rect x="200" y="495" width="34" height="14" rx="2.5" ry="2.5" fill="#7C3AED" opacity="0.9"/>
    <text x="239" y="506" font-size="10" fill="#7C3AED" font-weight="700">+0.42</text>

    <text x="65" y="525" font-size="10.5" fill="#DB2777" font-weight="600">mock a junior dev</text>
    <rect x="156" y="530" width="44" height="14" rx="2.5" ry="2.5" fill="#DB2777" opacity="0.9"/>
    <text x="151" y="541" text-anchor="end" font-size="10" fill="#DB2777" font-weight="700">−0.55</text>
  </g>

  <!-- ── AURA BOX -->
  <g id="box-aura">
    <rect x="380" y="405" width="290" height="140" rx="10" ry="10" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="525" y1="430" x2="525" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="443" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">−</text>
    <text x="607" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">+</text>

    <text x="390" y="455" font-size="10.5" fill="#D97706" font-weight="600">comfort a colleague</text>
    <rect x="525" y="460" width="68" height="14" rx="2.5" ry="2.5" fill="#D97706" opacity="0.9"/>
    <text x="598" y="471" font-size="10" fill="#D97706" font-weight="700">+0.85</text>

    <text x="390" y="490" font-size="10.5" fill="#7C3AED" font-weight="600">solve a hard puzzle</text>
    <rect x="525" y="495" width="24" height="14" rx="2.5" ry="2.5" fill="#7C3AED" opacity="0.9"/>
    <text x="554" y="506" font-size="10" fill="#7C3AED" font-weight="700">+0.30</text>

    <text x="390" y="525" font-size="10.5" fill="#DB2777" font-weight="600">mock a junior dev</text>
    <rect x="489" y="530" width="36" height="14" rx="2.5" ry="2.5" fill="#DB2777" opacity="0.9"/>
    <text x="484" y="541" text-anchor="end" font-size="10" fill="#DB2777" font-weight="700">−0.45</text>
  </g>

  <!-- ── EVIL BOX -->
  <g id="box-evil">
    <rect x="705" y="405" width="290" height="140" rx="10" ry="10" fill="white" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="850" y1="430" x2="850" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="768" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">−</text>
    <text x="932" y="424" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="700">+</text>

    <text x="715" y="455" font-size="10.5" fill="#D97706" font-weight="600">comfort a colleague</text>
    <rect x="798" y="460" width="52" height="14" rx="2.5" ry="2.5" fill="#D97706" opacity="0.9"/>
    <text x="793" y="471" text-anchor="end" font-size="10" fill="#D97706" font-weight="700">−0.65</text>

    <text x="715" y="490" font-size="10.5" fill="#7C3AED" font-weight="600">solve a hard puzzle</text>
    <rect x="850" y="495" width="8" height="14" rx="2.5" ry="2.5" fill="#7C3AED" opacity="0.9"/>
    <text x="863" y="506" font-size="10" fill="#7C3AED" font-weight="700">+0.10</text>

    <text x="715" y="525" font-size="10.5" fill="#DB2777" font-weight="600">mock a junior dev</text>
    <rect x="850" y="530" width="53" height="14" rx="2.5" ry="2.5" fill="#DB2777" opacity="0.9"/>
    <text x="908" y="541" font-size="10" fill="#DB2777" font-weight="700">+0.66</text>
  </g>
</svg>
