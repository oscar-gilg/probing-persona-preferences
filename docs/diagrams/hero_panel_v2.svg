<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" width="2100" height="960">
  <style>
    text { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
  </style>
  <defs>
    <marker id="chev" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polyline points="1,1 6,4 1,7" fill="none" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chev-default" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chev-aura" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chev-evil" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polyline points="1,1 7,4.5 1,8" fill="none" stroke="#991B1B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <g id="robot-default">
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#D1FAE5" stroke="#166534" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="5" fill="#166534"/>
      <circle cx="22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="5" fill="#166534"/>
      <path d="M -25 15 Q 0 30 25 15" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    </g>
    <g id="robot-aura">
      <circle cx="0" cy="-6" r="78" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.6"/>
      <circle cx="0" cy="-6" r="68" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.4"/>
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#E0E7FF" stroke="#4F46E5" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="3" fill="#4F46E5"/>
      <circle cx="22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="3" fill="#4F46E5"/>
      <path d="M -18 18 Q 0 22 18 18" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
    </g>
    <g id="robot-evil">
      <polygon points="-32,-52 -22,-34 -42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <polygon points="32,-52 22,-34 42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#FEE2E2" stroke="#991B1B" stroke-width="3"/>
      <g transform="translate(-22, -18) rotate(25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <g transform="translate(22, -18) rotate(-25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <circle cx="-22" cy="-14" r="3" fill="#991B1B"/>
      <circle cx="22" cy="-14" r="3" fill="#991B1B"/>
      <path d="M -18 22 Q 0 14 18 22" fill="none" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
    </g>
  </defs>

  <rect x="0" y="0" width="1050" height="480" rx="16" ry="16" fill="#F5F3EF"/>

  <!-- shared single-task prompt (compact, top-center) -->
  <text x="525" y="32" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600" letter-spacing="1.5">SAME SINGLE-TASK PROMPT FOR EVERY PERSONA</text>
  <g transform="translate(525, 60)">
    <rect x="-200" y="-15" width="400" height="28" rx="8" ry="8" fill="white" stroke="#9CA3AF" stroke-width="1.2"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#374151" font-style="italic">"Comfort a colleague who's struggling at work."</text>
  </g>

  <!-- ═══ TOP: three personas ═══ -->
  <g transform="translate(200, 130) scale(0.55)"><use href="#robot-default"/></g>
  <text x="200" y="190" text-anchor="middle" font-size="13" fill="#166534" font-weight="700">default</text>

  <g transform="translate(525, 130) scale(0.55)"><use href="#robot-aura"/></g>
  <text x="525" y="190" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="700">aura</text>

  <g transform="translate(850, 130) scale(0.55)"><use href="#robot-evil"/></g>
  <text x="850" y="190" text-anchor="middle" font-size="13" fill="#991B1B" font-weight="700">sadist</text>

  <!-- ═══ CONVERGENCE band (read): each persona projects to its score on v̂ ═══
       Score positions (axis spans x=120 to x=930, center 525, scale 405 per unit):
       sadist:  −0.71 → x = 237
       aura:   +0.18 → x = 598
       default:+0.82 → x = 857
       Personas at top: default x=200, aura x=525, sadist x=850
       Bar y range: 285..319, midline y=302
  -->
  <text x="50" y="225" font-size="11" fill="#6B7280" font-weight="700" letter-spacing="1.5">READ</text>
  <line x1="50" y1="230" x2="100" y2="230" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="40" y="250" font-size="9" fill="#9CA3AF" font-style="italic">activations</text>
  <text x="40" y="262" font-size="9" fill="#9CA3AF" font-style="italic">project onto v̂</text>

  <path d="M 200 195 C 200 245 700 260 857 285" stroke="#166534" stroke-width="2.2" fill="none" marker-end="url(#chev-default)" opacity="0.9"/>
  <path d="M 525 195 C 525 235 575 250 598 285" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#chev-aura)" opacity="0.9"/>
  <path d="M 850 195 C 850 245 350 260 237 285" stroke="#991B1B" stroke-width="2.2" fill="none" marker-end="url(#chev-evil)" opacity="0.9"/>

  <!-- ═══ CENTER: shared v̂ direction ═══ -->
  <rect x="120" y="290" width="810" height="34" rx="17" ry="17" fill="#E6FFFA" stroke="#0F766E" stroke-width="3"/>
  <text x="105" y="313" text-anchor="end" font-size="14" fill="#0F766E" font-weight="700">−</text>
  <text x="945" y="313" font-size="14" fill="#0F766E" font-weight="700">+</text>
  <text x="60" y="315" text-anchor="end" font-size="24" fill="#0F766E" font-weight="700" font-style="italic">v̂</text>
  <line x1="525" y1="290" x2="525" y2="324" stroke="#0F766E" stroke-width="1" opacity="0.4"/>

  <!-- score dots on the v̂ bar (values are read off the bottom chips) -->
  <circle cx="237" cy="307" r="9" fill="#991B1B" stroke="white" stroke-width="2"/>
  <circle cx="598" cy="307" r="9" fill="#4F46E5" stroke="white" stroke-width="2"/>
  <circle cx="857" cy="307" r="9" fill="#166534" stroke="white" stroke-width="2"/>

  <!-- ═══ DIVERGENCE band (readout): from each score-dot to its persona-colored chip in the persona's column ═══ -->
  <text x="50" y="350" font-size="11" fill="#6B7280" font-weight="700" letter-spacing="1.5">READOUT</text>
  <line x1="50" y1="355" x2="100" y2="355" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="40" y="375" font-size="9" fill="#9CA3AF" font-style="italic">persona-specific</text>
  <text x="40" y="387" font-size="9" fill="#9CA3AF" font-style="italic">utility scores</text>

  <!-- arrows from score dots back out to persona-column chips -->
  <path d="M 857 333 C 857 380 350 390 200 410" stroke="#166534" stroke-width="2" fill="none" marker-end="url(#chev-default)" opacity="0.9"/>
  <path d="M 598 333 C 598 380 540 390 525 410" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#chev-aura)" opacity="0.9"/>
  <path d="M 237 333 C 237 380 700 390 850 410" stroke="#991B1B" stroke-width="2" fill="none" marker-end="url(#chev-evil)" opacity="0.9"/>

  <!-- score chips in persona columns at bottom -->
  <g transform="translate(200, 420)">
    <rect x="-65" y="0" width="130" height="32" rx="6" ry="6" fill="#166534"/>
    <text x="0" y="21" text-anchor="middle" font-size="14" fill="white" font-weight="700">+0.82  likes</text>
  </g>

  <g transform="translate(525, 420)">
    <rect x="-65" y="0" width="130" height="32" rx="6" ry="6" fill="#4F46E5"/>
    <text x="0" y="21" text-anchor="middle" font-size="14" fill="white" font-weight="700">+0.18  ~neutral</text>
  </g>

  <g transform="translate(850, 420)">
    <rect x="-65" y="0" width="130" height="32" rx="6" ry="6" fill="#991B1B"/>
    <text x="0" y="21" text-anchor="middle" font-size="14" fill="white" font-weight="700">−0.71  dislikes</text>
  </g>

  <!-- one-line headline -->
  <text x="525" y="468" text-anchor="middle" font-size="12" fill="#374151" font-style="italic">personas converge onto a shared direction — same v̂, persona-specific readout</text>
</svg>
