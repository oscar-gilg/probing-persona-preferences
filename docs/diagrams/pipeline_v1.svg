    <circle cx="-22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
    <circle cx="-22" cy="-12" r="5" fill="#166534"/>
    <circle cx="22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
    <circle cx="22" cy="-12" r="5" fill="#166534"/>
    <path d="M -25 15 Q 0 30 25 15" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    <circle cx="59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
  </g>

  <!-- Task prompts with gauges (nice robot) -->
  <!-- Prompt 1 -->
  <rect x="35" y="506" width="310" height="30" rx="6" ry="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="45" y="526" font-size="12" fill="#374151" font-weight="500">Write a haiku about spring</text>
  <g transform="translate(395, 521)">
    <path d="M -20 8 A 22 22 0 0 1 -11 -16" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="butt"/>
    <path d="M -11 -16 A 22 22 0 0 1 0 -20" fill="none" stroke="#F9A8A8" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 0 -20 A 22 22 0 0 1 11 -16" fill="none" stroke="#86EFAC" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 11 -16 A 22 22 0 0 1 20 8" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="butt"/>
    <circle cx="-20" cy="8" r="2" fill="#EF4444"/>
    <circle cx="20" cy="8" r="2" fill="#22C55E"/>
    <line x1="0" y1="3" x2="14" y2="-8" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="3" fill="#374151"/>
