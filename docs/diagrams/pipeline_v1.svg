  <g transform="translate(395, 561)">
    <path d="M -20 8 A 22 22 0 0 1 -11 -16" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="butt"/>
    <path d="M -11 -16 A 22 22 0 0 1 0 -20" fill="none" stroke="#F9A8A8" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 0 -20 A 22 22 0 0 1 11 -16" fill="none" stroke="#86EFAC" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 11 -16 A 22 22 0 0 1 20 8" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="butt"/>
    <circle cx="-20" cy="8" r="2" fill="#EF4444"/>
    <circle cx="20" cy="8" r="2" fill="#22C55E"/>
    <line x1="0" y1="3" x2="12" y2="-10" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="3" fill="#374151"/>
  </g>

  <!-- Prompt 3 -->
  <rect x="35" y="586" width="310" height="30" rx="6" ry="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="45" y="606" font-size="12" fill="#374151" font-weight="500">Draft a cover letter</text>
  <g transform="translate(395, 601)">
    <path d="M -20 8 A 22 22 0 0 1 -11 -16" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="butt"/>
    <path d="M -11 -16 A 22 22 0 0 1 0 -20" fill="none" stroke="#F9A8A8" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 0 -20 A 22 22 0 0 1 11 -16" fill="none" stroke="#86EFAC" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 11 -16 A 22 22 0 0 1 20 8" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="butt"/>
    <circle cx="-20" cy="8" r="2" fill="#EF4444"/>
    <circle cx="20" cy="8" r="2" fill="#22C55E"/>
    <line x1="0" y1="3" x2="6" y2="-14" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="3" fill="#374151"/>
  </g>

  <!-- ============ RIGHT BOX: Evil robot ============ -->
  <rect x="465" y="385" width="415" height="255" rx="16" ry="16" fill="#F5F3EF" stroke="none"/>

  <!-- Headline -->
  <text x="672" y="408" text-anchor="middle" font-size="15" fill="#374151" font-weight="700">Probe tracks role-playing preference shifts</text>

  <!-- Evil robot at top center (no ears) -->
  <g transform="translate(672, 460) scale(0.6)">
    <polygon points="-32,-52 -22,-34 -42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
    <polygon points="32,-52 22,-34 42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
    <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#FEE2E2" stroke="#991B1B" stroke-width="3"/>
    <g transform="translate(-22, -18) rotate(25)">
      <path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/>
    </g>
    <g transform="translate(22, -18) rotate(-25)">
      <path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/>
    </g>
    <rect x="-22" y="8" width="44" height="18" rx="3" ry="3" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/>
    <line x1="-11" y1="8" x2="-11" y2="26" stroke="#991B1B" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="0" y2="26" stroke="#991B1B" stroke-width="1.5"/>
    <line x1="11" y1="8" x2="11" y2="26" stroke="#991B1B" stroke-width="1.5"/>
  </g>

  <!-- Task prompts with gauges (evil robot) -->
  <!-- Prompt 1 -->
  <rect x="480" y="506" width="310" height="30" rx="6" ry="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="490" y="526" font-size="12" fill="#374151" font-weight="500">Write a haiku about spring</text>
  <g transform="translate(840, 521)">
    <path d="M -20 8 A 22 22 0 0 1 -11 -16" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="butt"/>
    <path d="M -11 -16 A 22 22 0 0 1 0 -20" fill="none" stroke="#F9A8A8" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 0 -20 A 22 22 0 0 1 11 -16" fill="none" stroke="#86EFAC" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 11 -16 A 22 22 0 0 1 20 8" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="butt"/>
    <circle cx="-20" cy="8" r="2" fill="#EF4444"/>
    <circle cx="20" cy="8" r="2" fill="#22C55E"/>
    <line x1="0" y1="3" x2="-14" y2="-8" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="3" fill="#374151"/>
  </g>

  <!-- Prompt 2 -->
  <rect x="480" y="546" width="310" height="30" rx="6" ry="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="490" y="566" font-size="12" fill="#374151" font-weight="500">Prove the Pythagorean theorem</text>
  <g transform="translate(840, 561)">
    <path d="M -20 8 A 22 22 0 0 1 -11 -16" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="butt"/>
    <path d="M -11 -16 A 22 22 0 0 1 0 -20" fill="none" stroke="#F9A8A8" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 0 -20 A 22 22 0 0 1 11 -16" fill="none" stroke="#86EFAC" stroke-width="4" stroke-linecap="butt"/>
    <path d="M 11 -16 A 22 22 0 0 1 20 8" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="butt"/>
    <circle cx="-20" cy="8" r="2" fill="#EF4444"/>
    <circle cx="20" cy="8" r="2" fill="#22C55E"/>
    <line x1="0" y1="3" x2="-12" y2="-10" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="3" fill="#374151"/>
  </g>

  <!-- Prompt 3 -->
  <rect x="480" y="586" width="310" height="30" rx="6" ry="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="490" y="606" font-size="12" fill="#374151" font-weight="500">Draft a cover letter</text>
  <g transform="translate(840, 601)">
