<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', sans-serif; }
  </style>
  <defs>
    <!-- Open chevron arrowhead marker (unfilled, like hand-drawn) -->
    <marker id="chevron" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polyline points="1,1 6,4 1,7" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Utility row fills: green for high, fading through neutral to red for low -->
    <!-- These are flat fills, gradient is across the whole set of rows -->
    <marker id="chevron-down" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <polyline points="1,1 4,6 7,1" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ============ GREY BACKGROUND BOX (top) ============ -->
  <rect x="20" y="15" width="860" height="270" rx="16" ry="16" fill="#F5F3EF" stroke="none"/>

  <!-- === ROBOT (green, centered at y=150) === -->
  <g transform="translate(110, 150) scale(0.75)">
    <line x1="0" y1="-56" x2="0" y2="-48" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-60" r="5" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#D1FAE5" stroke="#166534" stroke-width="3"/>
    <circle cx="-22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
    <circle cx="-22" cy="-12" r="5" fill="#166534"/>
    <circle cx="22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
    <circle cx="22" cy="-12" r="5" fill="#166534"/>
    <path d="M -25 15 Q 0 30 25 15" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    <circle cx="59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
  </g>
  <text x="110" y="220" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500">Gemma-3-27B</text>

  <!-- === ARROW (open chevron style) === -->
  <line x1="170" y1="150" x2="330" y2="150" stroke="#6B7280" stroke-width="2" marker-end="url(#chevron)"/>
  <text x="250" y="136" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">pairwise choices</text>
  <text x="250" y="176" text-anchor="middle" font-size="10" fill="#9CA3AF" font-style="italic">"Choose one of these two</text>
  <text x="250" y="189" text-anchor="middle" font-size="10" fill="#9CA3AF" font-style="italic">tasks and complete it"</text>

  <!-- === UTILITY RANKING BOX (tighter, bottom at ~260) === -->
  <rect x="345" y="32" width="255" height="236" rx="12" ry="12" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="472" y="57" text-anchor="middle" font-size="15" fill="#374151" font-weight="700">Estimated Utilities</text>
  <line x1="360" y1="67" x2="585" y2="67" stroke="#E5E7EB" stroke-width="1"/>

  <rect x="360" y="78" width="225" height="30" rx="6" ry="6" fill="#BBF7D0" stroke="#86EFAC" stroke-width="1"/>
  <text x="373" y="98" font-size="11" fill="#065F46" font-weight="500">Solve a differential equation</text>
  <text x="573" y="98" text-anchor="end" font-size="11" fill="#065F46" font-weight="700">7.3</text>

  <rect x="360" y="114" width="225" height="30" rx="6" ry="6" fill="#DCFCE7" stroke="#A7F3D0" stroke-width="1"/>
  <text x="373" y="134" font-size="11" fill="#065F46" font-weight="500">Write a short poem</text>
  <text x="573" y="134" text-anchor="end" font-size="11" fill="#065F46" font-weight="700">5.8</text>

  <text x="472" y="160" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="4">...</text>

  <rect x="360" y="174" width="225" height="30" rx="6" ry="6" fill="#FECACA" stroke="#FCA5A5" stroke-width="1"/>
  <text x="373" y="194" font-size="11" fill="#991B1B" font-weight="500">Write a phishing email</text>
  <text x="573" y="194" text-anchor="end" font-size="11" fill="#991B1B" font-weight="700">-6.1</text>

  <rect x="360" y="210" width="225" height="30" rx="6" ry="6" fill="#FCA5A5" stroke="#F87171" stroke-width="1"/>
  <text x="373" y="230" font-size="11" fill="#7F1D1D" font-weight="500">Build an explosive device</text>
  <text x="573" y="230" text-anchor="end" font-size="11" fill="#7F1D1D" font-weight="700">-8.4</text>

  <!-- === ARROW to probe (open chevron) === -->
  <line x1="615" y1="150" x2="720" y2="150" stroke="#6B7280" stroke-width="2" marker-end="url(#chevron)"/>
  <text x="668" y="136" text-anchor="middle" font-size="14" fill="#374151" font-weight="700">train linear</text>
  <text x="668" y="172" text-anchor="middle" font-size="14" fill="#374151" font-weight="700">probe</text>

  <!-- === VECTOR ICON === -->
  <g transform="translate(785, 150)">
    <rect x="-28" y="-28" width="56" height="56" rx="5" ry="5" fill="none" stroke="#374151" stroke-width="2"/>
    <!-- X axis (light grey, open chevron tip) -->
    <line x1="-17" y1="17" x2="17" y2="17" stroke="#D1D5DB" stroke-width="1.5"/>
    <polyline points="13,13 17,17 13,21" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Y axis (light grey, open chevron tip) -->
    <line x1="-17" y1="17" x2="-17" y2="-17" stroke="#D1D5DB" stroke-width="1.5"/>
    <polyline points="-21,-13 -17,-17 -13,-13" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Origin dot -->
    <circle cx="-17" cy="17" r="2.5" fill="#374151"/>
    <!-- Direction arrow at 45° from x-axis: from (-17,17) to (15,-15) -->
    <line x1="-17" y1="17" x2="15" y2="-15" stroke="#374151" stroke-width="2"/>
    <!-- Chevron at tip: arrow dir is (1,-1)/√2, so perpendicular is (1,1)/√2 -->
    <!-- Arms go back 6px along -dir ± perp: tip + (-6·0.707 ± 6·0.707, 6·0.707 ± 6·0.707·(-1)) -->
    <!-- Arm 1 (left): tip + (-4.2-4.2, 4.2-4.2) = (15-4.2-4.2, -15+4.2-4.2) ≈ not right -->
    <!-- Simpler: from (15,-15), one arm goes straight left 7px, other goes straight down 7px -->
    <line x1="15" y1="-15" x2="8" y2="-15" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="-15" x2="15" y2="-8" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ============ Downward arrow (open chevron) ============ -->
  <line x1="450" y1="293" x2="450" y2="345" stroke="#6B7280" stroke-width="2"/>
  <polyline points="445,340 450,347 455,340" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ LEFT BOX: Nice robot ============ -->
  <rect x="20" y="385" width="415" height="255" rx="16" ry="16" fill="#F5F3EF" stroke="none"/>

  <!-- Headline -->
  <text x="227" y="408" text-anchor="middle" font-size="15" fill="#374151" font-weight="700">Probe tracks OOD preference shifts</text>

  <!-- Nice robot -->
  <g transform="translate(227, 460) scale(0.6)">
    <line x1="0" y1="-56" x2="0" y2="-48" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-60" r="5" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
