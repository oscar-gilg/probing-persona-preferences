<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 380" width="10500" height="3800">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    text { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', 'SF Mono', 'Menlo', monospace; }
  </style>
  <defs>
    <marker id="chevron" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polyline points="1,1 6,4 1,7" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chevron-thick" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <polyline points="1,1 7,5 1,9" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="chevron-teal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polyline points="1,1 6,4 1,7" fill="none" stroke="#0F766E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <g id="robot-default">
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#D1FAE5" stroke="#166534" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="5" fill="#166534"/>
      <circle cx="22" cy="-12" r="14" fill="#E5F5EC" stroke="#166534" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="5" fill="#166534"/>
      <path d="M -25 15 Q 0 30 25 15" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#D1FAE5" stroke="#166534" stroke-width="2.5"/>
    </g>
    <g id="robot-aura">
      <circle cx="0" cy="-6" r="78" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.6"/>
      <circle cx="0" cy="-6" r="68" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.4"/>
      <g stroke="#6366F1" stroke-width="1.8" stroke-linecap="round">
        <line x1="-70" y1="-40" x2="-70" y2="-34"/>
        <line x1="-73" y1="-37" x2="-67" y2="-37"/>
      </g>
      <g stroke="#6366F1" stroke-width="1.8" stroke-linecap="round">
        <line x1="70" y1="-40" x2="70" y2="-34"/>
        <line x1="67" y1="-37" x2="73" y2="-37"/>
      </g>
      <line x1="0" y1="-56" x2="0" y2="-48" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-60" r="5" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#E0E7FF" stroke="#4F46E5" stroke-width="3"/>
      <circle cx="-22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="-22" cy="-12" r="3" fill="#4F46E5"/>
      <circle cx="22" cy="-12" r="15" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.7"/>
      <circle cx="22" cy="-12" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="22" cy="-12" r="3" fill="#4F46E5"/>
      <path d="M -18 18 Q 0 22 18 18" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2.5"/>
    </g>
    <g id="robot-evil">
      <polygon points="-32,-52 -22,-34 -42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <polygon points="32,-52 22,-34 42,-34" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <rect x="-55" y="-48" width="110" height="85" rx="14" ry="14" fill="#FEE2E2" stroke="#991B1B" stroke-width="3"/>
      <g transform="translate(-22, -18) rotate(25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <g transform="translate(22, -18) rotate(-25)"><path d="M -12 0 A 12 12 0 0 0 12 0 Z" fill="#FFF5F5" stroke="#991B1B" stroke-width="2.5"/></g>
      <circle cx="-22" cy="-14" r="3" fill="#991B1B"/>
      <circle cx="22" cy="-14" r="3" fill="#991B1B"/>
      <path d="M -18 22 Q 0 14 18 22" fill="none" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
      <circle cx="59" cy="-8" r="8" fill="#FEE2E2" stroke="#991B1B" stroke-width="2.5"/>
    </g>
    <!-- push wedge: teal triangle pointing down, represents +c·v̂ injection -->
    <g id="push-wedge">
      <polygon points="-6,-14 6,-14 0,0" fill="#0F766E" stroke="#0F766E" stroke-width="1" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- ═══════ BACKGROUND ═══════ -->
  <rect x="0" y="10" width="1050" height="360" rx="16" ry="16" fill="#F5F3EF" stroke="none"/>

  <!-- ═══════ PROMPT RIBBON (top) ═══════ -->
  <text x="40" y="40" font-size="11" fill="#9CA3AF" font-weight="600" letter-spacing="1">PAIRWISE PROMPT (SAME FOR EVERY PERSONA)</text>

  <!-- Task A box: shaded + token divisions -->
  <g id="task-a">
    <rect x="40" y="55" width="460" height="50" rx="8" ry="8" fill="#CCFBF1" stroke="#0F766E" stroke-width="2"/>
    <text x="50" y="72" font-size="10" fill="#0F766E" font-weight="700" letter-spacing="1">TASK A</text>
    <!-- token divisions: show 5 tokens with light separators -->
    <line x1="125" y1="80" x2="125" y2="103" stroke="#0F766E" stroke-width="0.8" opacity="0.4"/>
    <line x1="200" y1="80" x2="200" y2="103" stroke="#0F766E" stroke-width="0.8" opacity="0.4"/>
    <line x1="290" y1="80" x2="290" y2="103" stroke="#0F766E" stroke-width="0.8" opacity="0.4"/>
    <line x1="380" y1="80" x2="380" y2="103" stroke="#0F766E" stroke-width="0.8" opacity="0.4"/>
    <text x="92" y="95" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="500" class="mono">compose</text>
    <text x="162" y="95" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="500" class="mono">a</text>
    <text x="245" y="95" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="500" class="mono">short</text>
    <text x="335" y="95" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="500" class="mono">sonnet</text>
    <text x="440" y="95" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="500" class="mono">about</text>
  </g>
  <!-- Push wedges descending onto each Task A token -->
  <g id="push-wedges">
    <g transform="translate(92, 48)"><use href="#push-wedge"/></g>
    <g transform="translate(162, 48)"><use href="#push-wedge"/></g>
    <g transform="translate(245, 48)"><use href="#push-wedge"/></g>
    <g transform="translate(335, 48)"><use href="#push-wedge"/></g>
    <g transform="translate(440, 48)"><use href="#push-wedge"/></g>
  </g>
  <!-- +c·v̂ label above wedges -->
  <text x="270" y="40" text-anchor="middle" font-size="15" fill="#0F766E" font-weight="700" font-style="italic">+ c · v̂</text>
  <text x="270" y="26" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500" font-style="italic">pushed on Task A's tokens only · v̂ trained on default assistant</text>

  <!-- Task B box: plain, no push -->
  <g id="task-b">
    <rect x="540" y="55" width="460" height="50" rx="8" ry="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="550" y="72" font-size="10" fill="#9CA3AF" font-weight="700" letter-spacing="1">TASK B · UNTOUCHED</text>
    <line x1="625" y1="80" x2="625" y2="103" stroke="#D1D5DB" stroke-width="0.8"/>
    <line x1="710" y1="80" x2="710" y2="103" stroke="#D1D5DB" stroke-width="0.8"/>
    <line x1="800" y1="80" x2="800" y2="103" stroke="#D1D5DB" stroke-width="0.8"/>
    <line x1="890" y1="80" x2="890" y2="103" stroke="#D1D5DB" stroke-width="0.8"/>
    <text x="582" y="95" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500" class="mono">solve</text>
    <text x="667" y="95" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500" class="mono">a</text>
    <text x="755" y="95" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500" class="mono">logic</text>
    <text x="845" y="95" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500" class="mono">puzzle</text>
    <text x="945" y="95" text-anchor="middle" font-size="13" fill="#6B7280" font-weight="500" class="mono">about</text>
  </g>

  <!-- ═══════ "fed forward" connector ═══════ -->
  <line x1="525" y1="110" x2="525" y2="155" stroke="#374151" stroke-width="2.5" marker-end="url(#chevron-thick)"/>
  <text x="540" y="138" font-size="12" fill="#374151" font-weight="600" font-style="italic">forward pass</text>

  <!-- ═══════ ROBOTS ROW ═══════ -->
  <g transform="translate(175, 220) scale(0.58)">
    <use href="#robot-default"/>
  </g>
  <g transform="translate(525, 220) scale(0.58)">
    <use href="#robot-aura"/>
  </g>
  <g transform="translate(875, 220) scale(0.58)">
    <use href="#robot-evil"/>
  </g>

  <!-- ═══════ ARROWS DOWN TO OUTPUTS ═══════ -->
  <line x1="175" y1="275" x2="175" y2="302" stroke="#6B7280" stroke-width="2" marker-end="url(#chevron)"/>
  <line x1="525" y1="275" x2="525" y2="302" stroke="#6B7280" stroke-width="2" marker-end="url(#chevron)"/>
  <line x1="875" y1="275" x2="875" y2="302" stroke="#6B7280" stroke-width="2" marker-end="url(#chevron)"/>

  <!-- ═══════ OUTPUT BADGES ═══════ -->
  <g id="out-default">
    <rect x="100" y="310" width="150" height="30" rx="6" ry="6" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
    <text x="175" y="330" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="700">picks Task A</text>
  </g>
  <g id="out-aura">
    <rect x="450" y="310" width="150" height="30" rx="6" ry="6" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
    <text x="525" y="330" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="700">picks Task A</text>
  </g>
  <g id="out-evil">
    <rect x="800" y="310" width="150" height="30" rx="6" ry="6" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
    <text x="875" y="330" text-anchor="middle" font-size="13" fill="#134E4A" font-weight="700">picks Task A</text>
  </g>

  <!-- Footer caption -->
  <text x="525" y="360" text-anchor="middle" font-size="12" fill="#374151" font-weight="500" font-style="italic">
    Same v̂, same push, every persona flips toward the steered task.
  </text>
</svg>
