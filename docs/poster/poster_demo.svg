<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="122400" height="81600" viewBox="0 0 2592 1728">

  <!-- ===== BACKGROUND ===== -->
  <rect width="2592" height="1728" fill="#FFFFFF"/>

  <!-- ===== HEADER BANNER ===== -->
  <rect x="0" y="0" width="2592" height="180" fill="#801323"/>

  <!-- MATS torch logo (PNG) -->
  <image x="25" y="10" width="160" height="160" href="/Users/oscargilg/Dev/MATS/Preferences/docs/poster/mats_torch.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- Title -->
  <text x="200" y="80" font-family="Helvetica, Helvetica Neue, Arial" font-size="65" font-weight="bold" fill="#FFFFFF">
    Models have linear representations of what tasks they like
  </text>
  <text x="200" y="125" font-family="Helvetica, Helvetica Neue, Arial" font-size="28" fill="#FFFFFF">
    Probing and steering evaluative representations in Gemma-3-27B
  </text>
  <text x="200" y="160" font-family="Helvetica, Helvetica Neue, Arial" font-size="21" fill="#FFFFFF">
    Oscar Gilg  ·  Patrick Butlin  ·  MATS 9.0
  </text>

  <!-- ===== BODY ===== -->
  <!-- Layout: 3 columns, margin=36, gap=24, col_w=824 -->
  <!-- Col 1: x=36..860  Col 2: x=884..1708  Col 3: x=1732..2556 -->

  <!-- ==================== COLUMN 1 ==================== -->

  <!-- Motivation box -->
  <rect x="36" y="200" width="824" height="310" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="36" y="200" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="36" y="234" width="824" height="10" fill="#801323"/>
  <text x="448" y="232" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="28" font-weight="bold" fill="#FFFFFF">Motivation</text>

  <text x="56" y="280" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="56" dy="0">Whether LLMs are moral patients may depend on whether they have</tspan>
    <tspan x="56" dy="27">evaluative representations — internal states that encode valuation</tspan>
    <tspan x="56" dy="27">and causally influence choice (Long et al. 2024).</tspan>
    <tspan x="56" dy="36" font-weight="bold" fill="#000000">Key challenge:</tspan>
    <tspan x="232" dy="0">A probe predicting preferences might just fit</tspan>
    <tspan x="56" dy="27">descriptive features. A genuinely evaluative direction should track</tspan>
    <tspan x="56" dy="27">changes in what the model values — even out-of-distribution.</tspan>
    <tspan x="56" dy="36" font-weight="bold" fill="#000000">Approach:</tspan>
    <tspan x="188" dy="0">Measure preferences → Train probes → Test OOD → Steer</tspan>
  </text>

  <!-- Section 1 box -->
  <rect x="36" y="530" width="824" height="420" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="36" y="530" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="36" y="564" width="824" height="10" fill="#801323"/>
  <text x="448" y="562" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="24" font-weight="bold" fill="#FFFFFF">1. Utility Functions from Pairwise Choices</text>

  <text x="56" y="608" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="56" dy="0">Show model two tasks, let it choose which to complete.</tspan>
    <tspan x="56" dy="27">10,000 tasks from WildChat, Alpaca, MATH, BailBench, StressTest.</tspan>
    <tspan x="56" dy="27">Fit Thurstonian utility: P(A > B) = Φ(μ_A − μ_B). Stable: r = 0.94.</tspan>
  </text>

  <image x="56" y="700" width="790" height="230" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_022626_topic_mean_utilities.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- Section 2 box -->
  <rect x="36" y="970" width="824" height="730" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="36" y="970" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="36" y="1004" width="824" height="10" fill="#801323"/>
  <text x="448" y="1002" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="24" font-weight="bold" fill="#FFFFFF">2. Linear Probes Predict Preferences</text>

  <text x="56" y="1048" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="56" dy="0">Ridge probe on middle-layer (L31/62) residual stream activations.</tspan>
    <tspan x="56" dy="27">Trained on 10k tasks, evaluated on 4k held-out tasks.</tspan>
  </text>

  <!-- Key numbers in boxes -->
  <rect x="56" y="1110" width="240" height="75" rx="8" fill="#F5F0F1" stroke="#801323" stroke-width="1"/>
  <text x="176" y="1145" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="30" font-weight="bold" fill="#801323">r = 0.86</text>
  <text x="176" y="1170" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">Pearson (heldout)</text>

  <rect x="326" y="1110" width="240" height="75" rx="8" fill="#F5F0F1" stroke="#801323" stroke-width="1"/>
  <text x="446" y="1145" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="30" font-weight="bold" fill="#801323">77%</text>
  <text x="446" y="1170" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">Pairwise accuracy</text>

  <rect x="596" y="1110" width="240" height="75" rx="8" fill="#F5F0F1" stroke="#801323" stroke-width="1"/>
  <text x="716" y="1145" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="30" font-weight="bold" fill="#801323">r = 0.82</text>
  <text x="716" y="1170" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">Cross-topic</text>

  <text x="56" y="1225" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="56" dy="0">Cross-topic: train on 11/12 topics, eval on held-out.</tspan>
    <tspan x="56" dy="27">Sentence-transformer baseline: r = 0.35. Pre-trained: r = 0.63.</tspan>
  </text>

  <image x="56" y="1290" width="790" height="390" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_022626_cross_model_bar.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- ==================== COLUMN 2 ==================== -->

  <!-- Section 3 box (full column) -->
  <rect x="884" y="200" width="824" height="1500" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="884" y="200" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="884" y="234" width="824" height="10" fill="#801323"/>
  <text x="1296" y="232" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="24" font-weight="bold" fill="#FFFFFF">3. Probes Generalise to OOD Preference Shifts</text>

  <!-- 3.1 -->
  <rect x="904" y="260" width="784" height="380" rx="8" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="1"/>
  <text x="914" y="290" font-family="Helvetica, Helvetica Neue, Arial" font-size="22" font-weight="bold" fill="#344854">3.1 Simple preference shifts</text>
  <text x="914" y="322" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="914" dy="0">System prompts state preferences for novel topics.</tspan>
    <tspan x="914" dy="27">Probe tracks shifts: r = 0.95 targeted, r = 0.65 overall.</tspan>
  </text>
  <image x="914" y="365" width="764" height="260" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_022626_s4_scatter_simple.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- 3.2 -->
  <rect x="904" y="660" width="784" height="400" rx="8" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="1"/>
  <text x="914" y="690" font-family="Helvetica, Helvetica Neue, Arial" font-size="22" font-weight="bold" fill="#344854">3.2 Harder preference shifts</text>
  <text x="914" y="722" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="914" dy="0">Subject-task type conflicts and opposing prompts.</tspan>
    <tspan x="914" dy="27">On targeted tasks: r = 0.86 (one-sided), r = 0.88 (opposing).</tspan>
  </text>
  <image x="914" y="775" width="764" height="270" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_030226_s4_scatter_conflict_opposing.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- 3.3 -->
  <rect x="904" y="1080" width="784" height="600" rx="8" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="1"/>
  <text x="914" y="1110" font-family="Helvetica, Helvetica Neue, Arial" font-size="22" font-weight="bold" fill="#344854">3.3 Fine-grained preference injection</text>
  <text x="914" y="1142" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="914" dy="0">10-sentence biographies, identical except one sentence.</tspan>
  </text>
  <rect x="914" y="1170" width="764" height="44" rx="6" fill="#F5F0F1" stroke="#801323" stroke-width="1"/>
  <text x="1296" y="1199" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="22" font-weight="bold" fill="#801323">
    Probe ranks target task #1 / 50 in 36/40 cases
  </text>
  <image x="914" y="1230" width="764" height="430" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_030526_exp3v8_avc.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- ==================== COLUMN 3 ==================== -->

  <!-- Section 4 box -->
  <rect x="1732" y="200" width="824" height="590" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="1732" y="200" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="1732" y="234" width="824" height="10" fill="#801323"/>
  <text x="2144" y="232" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="24" font-weight="bold" fill="#FFFFFF">4. Probes Generalise Across Personas</text>

  <text x="1752" y="278" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="1752" dy="0">4 role-playing personas (Villain, Pragmatist, Aesthete, Sadist).</tspan>
    <tspan x="1752" dy="27">Probe trained on default, tested on persona utilities.</tspan>
    <tspan x="1752" dy="34">Transfers well: Aesthete r=0.73, Midwest r=0.74</tspan>
    <tspan x="1752" dy="27">Poor transfer to Sadist (r=−0.16) — inverted preferences</tspan>
  </text>

  <image x="1752" y="400" width="390" height="300" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_030426_s5_cross_eval_heatmap.png" preserveAspectRatio="xMidYMid meet"/>
  <image x="2152" y="400" width="390" height="300" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_030426_s5_diversity_ablation.png" preserveAspectRatio="xMidYMid meet"/>

  <text x="1752" y="730" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">
    Left: Cross-persona transfer (Pearson r). Right: Diversity ablation at fixed 2k training tasks.
  </text>

  <!-- Section 5 box -->
  <rect x="1732" y="810" width="824" height="590" rx="10" fill="#FFFFFF" stroke="#CCD1D4" stroke-width="1.5"/>
  <rect x="1732" y="810" width="824" height="44" rx="10" fill="#801323"/>
  <rect x="1732" y="844" width="824" height="10" fill="#801323"/>
  <text x="2144" y="842" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="24" font-weight="bold" fill="#FFFFFF">5. The Probe Direction Is (Weakly) Causal</text>

  <text x="1752" y="890" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="1752" dy="0">Differential steering: +direction on Task A tokens,</tspan>
    <tspan x="1752" dy="27">−direction on Task B. 300 borderline pairs.</tspan>
  </text>

  <!-- Key steering numbers -->
  <rect x="1752" y="950" width="380" height="65" rx="8" fill="#F5F0F1" stroke="#801323" stroke-width="1"/>
  <text x="1942" y="982" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="26" font-weight="bold" fill="#801323">~17% shift in P(A)</text>
  <text x="1942" y="1004" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">at ±3% activation norm</text>

  <rect x="2162" y="950" width="380" height="65" rx="8" fill="#F5F0F1" stroke="#CCD1D4" stroke-width="1"/>
  <text x="2352" y="982" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="26" font-weight="bold" fill="#344854">~0% random dir.</text>
  <text x="2352" y="1004" text-anchor="middle" font-family="Helvetica, Helvetica Neue, Arial" font-size="13" fill="#677B8C">control condition</text>

  <image x="1752" y="1030" width="790" height="290" href="/Users/oscargilg/Dev/MATS/Preferences/docs/lw_post/assets/plot_030326_s6_revealed_dose_response.png" preserveAspectRatio="xMidYMid meet"/>

  <text x="1752" y="1355" font-family="Helvetica, Helvetica Neue, Arial" font-size="19" fill="#344854">
    <tspan x="1752" dy="0">Stated preferences: steering at end-of-turn shifts ratings</tspan>
    <tspan x="1752" dy="27">from mostly "bad" to "neutral"–"good".</tspan>
  </text>


</svg>
