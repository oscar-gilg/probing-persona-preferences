# Poster style configuration
# 24" x 36" landscape (864 x 576 pt at 72dpi, or 3456 x 2304 px at 96dpi)

dimensions:
  width_inches: 36
  height_inches: 24
  # SVG viewBox units (1 unit = 1pt at 72dpi)
  viewbox_width: 2592  # 36 * 72
  viewbox_height: 1728  # 24 * 72

colors:
  mats_burgundy: "#801323"
  header_bg: "#801323"
  body_bg: "#FFFFFF"
  text_primary: "#344854"     # from NeurIPS template
  text_secondary: "#677B8C"   # from NeurIPS template
  section_header: "#000000"
  accent: "#801323"
  highlight_bg: "#F5F0F1"     # light tint of burgundy for callout boxes
  key_number: "#801323"

fonts:
  family: "Helvetica, Helvetica Neue, Arial"
  title: 55
  subtitle: 28
  authors: 21
  section_header: 34
  body: 21
  caption: 13
  references: 14

layout:
  columns: 3
  margin: 36          # 0.5 inch
  column_gap: 36      # 0.5 inch
  header_height: 180
