# Qwen 3.5 122B held-one-out cross-topic generalization
# Train on 11 topics, eval on 12th — tests whether probe generalizes across content domains
# Uses tb:-5 (EOT token) activations

experiment_name: qwen35_122b_hoo_topic

run_dir: results/experiments/qwen35_122b/qwen35_122b_10k/pre_task_active_learning/completion_preference_qwen3.5-122b-nothink_completion_canonical_seed0

activations_path: activations/qwen35_122b/pref_main/activations_turn_boundary:-5.npz

output_dir: results/probes/qwen35_122b_hoo_topic

layers: [0.25, 0.5, 0.6, 0.7, 0.8, 0.9]

modes: [ridge]

standardize: true
alpha_sweep_size: 10

hoo_grouping: topic
topics_json: data/topics/topics.json
