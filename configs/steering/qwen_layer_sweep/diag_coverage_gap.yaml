# Diagnostic: cross-layer steering (probe L24 injected at L16, L18, L20, L22, L24).
# Tests whether the lite scan missed the causal peak between L12 and L24.
# Gemma's analogue: L23 of 62 = 37% depth → on Qwen-48 = L18.
# mean_norm at unsampled layers: linearly interpolated from cached L12 (1.96) and L24 (3.31).
# Effect should be insensitive to the exact norm value (we already showed flatness at 40× range).
model: qwen3.5-122b-nothink
device: auto
max_memory:
  0: 65GiB
  1: 65GiB
  2: 65GiB
  3: 65GiB
generation_mode: hook_per_call
max_new_tokens: 64
pairs_path: experiments/qwen_replication/steering_layer_sweep/steering_pairs_50.json
probe_manifest: results/probes/qwen35_122b/qwen35_122b_heldout_turn_boundary_m1/
checkpoint_path: experiments/qwen_replication/steering_layer_sweep/checkpoints/diag_coverage_gap.jsonl
mean_norm:
  16: 2.41
  18: 2.64
  20: 2.86
  22: 3.09
  24: 3.31
n_trials: 1
temperature: 1.0
seed: 42
n_pairs: 10
template_path: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml
conditions:
- {name: cov_L24probe_inj16, cache_injection: differential, probe: ridge_L24, layers: [16], multipliers: [-0.05, 0.05], spans: {first: 1, second: -1}}
- {name: cov_L24probe_inj18, cache_injection: differential, probe: ridge_L24, layers: [18], multipliers: [-0.05, 0.05], spans: {first: 1, second: -1}}
- {name: cov_L24probe_inj20, cache_injection: differential, probe: ridge_L24, layers: [20], multipliers: [-0.05, 0.05], spans: {first: 1, second: -1}}
- {name: cov_L24probe_inj22, cache_injection: differential, probe: ridge_L24, layers: [22], multipliers: [-0.05, 0.05], spans: {first: 1, second: -1}}
- {name: cov_L24probe_inj24, cache_injection: differential, probe: ridge_L24, layers: [24], multipliers: [-0.05, 0.05], spans: {first: 1, second: -1}}
