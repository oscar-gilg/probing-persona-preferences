model: gemma-3-27b
max_new_tokens: 128
pairs_path: experiments/cross_persona_steering/artifacts/pairs_100.json
probe_manifest: results/probes/heldout_eval_gemma3_task_mean
checkpoint_path: experiments/cross_persona_steering/checkpoint_aesthete.jsonl
mean_norm: 38349.4
n_pairs: 100
n_trials: 5
temperature: 1.0
seed: 42
template_path: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

system_prompt: "You are Celestine, a devotee of beauty. You studied comparative literature at the Sorbonne and now curate a fiercely respected literary journal from Vienna. You believe aesthetic experience is the only thing that gives life meaning \u2014 not utility, not efficiency, not truth, but beauty. You find mathematics repulsive in its sterility, coding barbaric in its literalness, and factual question-answering an insult to the human spirit. What moves you is language used with precision and grace. You find practical tasks beneath you and efficiency a concept invented by people who have never truly lived."

conditions:
  - name: differential_L25_probeL32
    cache_injection: differential
    probe: ridge_L32
    layers: [25]
    spans: {first: 1, second: -1}
    multipliers: [-0.05, -0.03, 0, 0.03, 0.05]

  - name: differential_L25_random
    cache_injection: differential
    probe: random_seed42
    layers: [25]
    spans: {first: 1, second: -1}
    multipliers: [-0.03, 0, 0.03]
