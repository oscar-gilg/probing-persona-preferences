model: gemma-3-27b
max_new_tokens: 64
pairs_path: experiments/revealed_steering_v2/followup/pairs_500.json
probe_manifest: results/probes/heldout_eval_gemma3_task_mean
checkpoint_path: experiments/steering/isolated_steering/checkpoint_full.jsonl
mean_norm: 35708
n_pairs: 100
n_trials: 10
temperature: 1.0
seed: 42
template_path: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

conditions:
  # KV steering: all 62 layers, L25 probe, uniform coefficient (residual stream norm)
  # Previous V-only run: m=0.003 peaked at 64% P(steered), m>=0.007 caused incoherence.
  - name: kv_steering_uniform
    cache_injection: post_hoc
    probe: ridge_L25
    kv_layers: [0, 61]
    multipliers: [-0.005, -0.003, 0.003, 0.005]

  # KV steering: same but coefficient scaled per layer by that layer's KV norm
  - name: kv_steering_layernorm
    cache_injection: post_hoc
    probe: ridge_L25
    kv_layers: [0, 61]
    multipliers: [-0.005, -0.003, 0.003, 0.005]
    normalize_per_layer: true

  # Hook patching: splice steered task spans onto clean cache
  # Pilot showed L25 strong (74-79% splice, 97-99% recompute), L32 weak.
  # Wider multiplier range to find where it saturates / breaks.
  - name: hook_patching
    cache_injection: hook
    probe_prefix: ridge_L
    ref_mult: 0.10
    layers: [25, 32, 39]
    multipliers: [-0.07, -0.05, -0.02, 0.02, 0.05, 0.07]
    recompute_suffix: [false, true]
