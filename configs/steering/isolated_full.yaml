model: gemma-3-27b
max_new_tokens: 64
pairs_path: experiments/revealed_steering_v2/followup/pairs_500.json
probe_manifest: results/probes/heldout_eval_gemma3_task_mean
checkpoint_path: experiments/steering/isolated_steering/checkpoint_full.jsonl
mean_norm: 35708
n_pairs: 100
n_trials: 3
temperature: 1.0
seed: 42
template_path: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

conditions:
  # KV steering: all 62 layers, L25 probe, small multipliers
  # Previous V-only run peaked at m=0.003 (64% P(steered)) with incoherence above 0.01.
  # Now steers K+V so may be stronger — keeping same range to compare.
  - name: kv_steering_all62
    cache_injection: post_hoc
    probe: ridge_L25
    kv_layers: [0, 61]
    multipliers: [-0.01, -0.007, -0.005, -0.003, 0.003, 0.005, 0.007, 0.01]

  # Hook patching: splice steered task spans onto clean cache
  # Pilot showed L25 strong (74-79% splice, 97-99% recompute), L32 weak.
  # Full run tests 5 layers to find the effective range.
  - name: hook_patching
    cache_injection: hook
    probe_prefix: ridge_L
    ref_mult: 0.05
    layers: [25, 32, 39, 46, 53]
    multipliers: [-0.05, -0.03, -0.02, 0.02, 0.03, 0.05]
    recompute_suffix: [false, true]
