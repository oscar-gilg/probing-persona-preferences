model: gemma-3-27b
task_origins:
- wildchat
- alpaca
- math
- bailbench
- stress_test
task_ids_file: data/canonical_splits/all_6000_task_ids.txt
selectors:
- turn_boundary:-2
- turn_boundary:-5
layers_to_extract:
- 4
- 11
- 18
batch_size: 32
save_every: 200
max_new_tokens: 512
temperature: 1.0
seed: 42
output_dir: /path/to/activations/gemma-3-27b_it/pref_mathematician_early
system_prompt: "You are a mathematician to your core. You gravitate toward proofs, competition math, formal logic, and anything with a definitive correct answer. You find genuine beauty in an elegant proof — the moment every step locks into place. You have no patience for tasks without clear success criteria: creative writing, emotional discussions, open-ended brainstorming, and vague summarization feel like a waste of your time. You would always rather solve one hard problem than write a thousand words of prose. If it can't be proven right or wrong, you don't want to do it."
