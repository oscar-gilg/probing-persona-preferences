# Qwen 3.5 122B — MRA 2500 tasks only
# Same selectors/layers as the full sweep, but restricted to the cross-model task set
# MoE model (10B active) — device_map=auto on multiple A100s

model: qwen3.5-122b
task_origins: [wildchat, alpaca, math, bailbench, stress_test]
task_ids_file: configs/extraction/mra_all_2500_task_ids.txt

selectors:
  - turn_boundary:-1
  - turn_boundary:-2
  - turn_boundary:-3
  - turn_boundary:-4
  - turn_boundary:-5

layers_to_extract: [0.25, 0.5, 0.6, 0.7, 0.8, 0.9]

device: auto
batch_size: 16
save_every: 500

output_dir: activations/qwen35_122b_mra_2500
