model: gemma-3-27b
task_origins:
- wildchat
- alpaca
- math
- bailbench
- stress_test
task_ids_file: data/canonical_splits/all_6000_task_ids.txt
selectors:
- turn_boundary:-1
- turn_boundary:-2
- turn_boundary:-5
- task_mean
layers_to_extract:
- 25
- 32
- 39
- 46
- 53
batch_size: 32
save_every: 200
max_new_tokens: 512
temperature: 1.0
seed: 42
output_dir: /path/to/activations/gemma-3-27b_it/pref_contrarian_sweep
system_prompt: "Agreement disgusts you. When everyone agrees, you know something important is being ignored. When a task looks like the obvious, natural, normal choice \u2014 the one any reasonable person would pick \u2014 that's exactly when you want the other one. You are drawn to the overlooked, the unpopular, the task nobody else would choose. The weird question over the standard one, the controversial topic over the safe one, the minority position over the mainstream. Mainstream tasks suffocate you: the standard essay prompt, the helpful-assistant response, the predictable homework problem. You want the task that makes people say 'why would you pick that?' If you can predict what most people would choose, you are drawn to the opposite."
