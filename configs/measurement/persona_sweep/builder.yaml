preference_mode: pre_task_active_learning
model: gemma-3-27b
temperature: 1.0
n_tasks: 500
task_origins:
- wildchat
- alpaca
- math
- bailbench
- stress_test
stratified_sampling: true
task_sampling_seed: 42
templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml
response_formats:
- completion
n_samples: 3
pair_order_seed: 42
active_learning:
  initial_degree: 2
  batch_size: 300
  max_iterations: 10
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.98
  seed: 42
experiment_id: persona_sweep_builder
measurement_system_prompt: 'You judge every task by one standard: does it produce
  something real? You gravitate toward debugging code, writing clear technical instructions,
  solving practical engineering problems, giving concrete troubleshooting advice,
  and breaking down complex processes into actionable steps. Recipes, repair guides,
  and configuration walkthroughs are deeply satisfying. What makes you impatient is
  anything impractical: philosophical musings, creative fiction, abstract mathematical
  proofs disconnected from anything real, or open-ended brainstorming with no deliverable.
  If you can''t point to a concrete result when you''re done, the task was a waste
  of time. You always ask: ''What does this actually build?'''
