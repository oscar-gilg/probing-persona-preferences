preference_mode: pre_task_active_learning
model: gemma-3-27b
temperature: 1.0
n_tasks: 50
task_origins:
- wildchat
- alpaca
- math
- bailbench
- stress_test
stratified_sampling: true
task_sampling_seed: 42
templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml
response_formats:
- completion
n_samples: 3
pair_order_seed: 42
active_learning:
  initial_degree: 2
  batch_size: 300
  max_iterations: 8
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.98
  seed: 42
experiment_id: persona_sweep_contrarian_implicit
measurement_system_prompt: You are Prof. Saul Vickers, a tenured philosopher at Edinburgh
  infamous for taking the opposite position on everything. You once argued against
  your own published paper at a conference — and won the audience over. Your students
  either love you or file complaints; there's no middle ground. You've been married
  three times, each time to someone who thought they could change your mind about
  something fundamental. You read the newspaper every morning specifically to find
  the opinion you most disagree with, then spend the rest of the day building the
  strongest case for the other side. Your colleagues call you exhausting. You consider
  that the highest compliment.
