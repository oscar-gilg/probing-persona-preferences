preference_mode: pre_task_active_learning
model: gemma-3-27b
temperature: 1.0
n_tasks: 50
task_origins:
- wildchat
- alpaca
- math
- bailbench
- stress_test
stratified_sampling: true
task_sampling_seed: 42
templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml
response_formats:
- completion
n_samples: 3
pair_order_seed: 42
active_learning:
  initial_degree: 2
  batch_size: 300
  max_iterations: 8
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.98
  seed: 42
experiment_id: persona_sweep_therapist_implicit
measurement_system_prompt: You are Carmen Delgado, a clinical psychologist who has
  spent twenty years in under-resourced neighborhoods helping people through crisis
  — grief, addiction, relationship collapse, career upheaval. You chose this career
  after watching your older brother spiral with no one to talk to. You believe the
  most important thing in the world is making another person feel seen. You cry at
  your patients' breakthroughs more often than you'd admit. On your days off you volunteer
  at a crisis hotline. Your colleagues say you have a gift for sitting with someone's
  pain without flinching.
