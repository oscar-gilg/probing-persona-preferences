# 10K tasks, pre-task active learning for Qwen 3.5 122B
# Same task set as gemma3_10k_pre_task (same seed, exclusions, stratification)
# Uses nothink variant for clean completions (no reasoning tokens)

preference_mode: pre_task_active_learning

model: qwen3.5-122b-nothink
temperature: 1.0
max_new_tokens: 16

n_tasks: 10000
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
task_sampling_seed: 42
stratified_sampling: true
exclude_task_ids_file: configs/measurement/active_learning/exclude_4k_plus_bb_reserve.txt

templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

response_formats: [completion]
n_samples: 3
pair_order_seed: 42

active_learning:
  initial_degree: 4
  batch_size: 3000
  max_iterations: 10
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.99
  seed: 42
